# 웹 배포 (conventions §6): main push 시 apps/web 빌드 → Cloudflare Pages 직접 업로드(D-19).
# 빌드는 GitHub Actions, 배포는 wrangler pages deploy — 배포 설정이 저장소 안 파일로 유지된다.
# 사이트: https://tetorial.pages.dev (D-19). Worker URL은 저장소 변수 PUBLIC_WORKER_URL로 주입
# (conventions §7 — 시크릿 아님, 공개 URL). 시크릿: CLOUDFLARE_API_TOKEN(Pages Edit 권한),
# CLOUDFLARE_ACCOUNT_ID.
name: Deploy Web

on:
  push:
    branches: [main]
    # 웹·의존 패키지·잠금 파일·이 워크플로우 변경 시에만 배포
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read

# 배포는 동시성 1개 (진행 중 배포를 취소하지 않고 큐잉)
concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # 버전은 루트 package.json의 packageManager 필드를 따른다
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build apps/web
        run: pnpm --filter @tetorial/web build
        env:
          PUBLIC_WORKER_URL: ${{ vars.PUBLIC_WORKER_URL }}
      - name: Deploy to Cloudflare Pages
        run: pnpm dlx wrangler pages deploy apps/web/dist --project-name=tetorial
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
