# PR 워크플로우 (conventions §6): lint · typecheck · test 필수 통과
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # 버전은 루트 package.json의 packageManager 필드를 따른다
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: node tools/check-acceptance.mjs # 수용 기준 ID ↔ 테스트 대조 (kickoff §3)

  # 실브라우저 E2E (W4 규범 — 2026-07-12 추가: mock 통과 ≠ 실동작이 스모크에서 실증됨)
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tetorial/web exec playwright install chromium --with-deps
      - run: pnpm --filter @tetorial/web e2e
